name: Build WebKit WiiU (WKC)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT:  /opt/devkitpro/wut

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: |
            Source/JavaScriptCore
            Source/WebCore
            Source/WebKit/WKC
            Source/WTF
            Source/bmalloc

      - name: Cache apt packages
        id: cache-apt
        uses: actions/cache@v5.0.4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-cmake-ninja-icu-gperf-ruby-perl

      - name: Install CMake + build tools
        run: |
          apt-get update -q
          apt-get install -y cmake ninja-build python3 libicu-dev gperf ruby perl

      - name: Install ICU headers
        run: |
          mkdir -p /tmp/icu-headers
          cp -r /usr/include/unicode /tmp/icu-headers/

      - name: Cache generated WebCore files
        id: cache-generated
        uses: actions/cache@v5.0.4
        with:
          path: .generated-cache
          key: generated-headers-${{ hashFiles('Source/WebCore/platform/network/HTTPHeaderNames.in', 'Source/WebCore/css/CSSValueKeywords.in', 'Source/WebCore/css/SVGCSSValueKeywords.in', 'Source/WebCore/page/FrameTreeSyncData.in', 'Source/WebCore/html/HTMLAttributeNames.in', 'Source/WebCore/html/HTMLTagNames.in', 'Source/WebCore/svg/svgattrs.in', 'Source/WebCore/svg/svgtags.in', 'Source/WebCore/mathml/mathattrs.in', 'Source/WebCore/mathml/mathtags.in', 'Source/WebCore/css/WebKitFontFamilyNames.in', 'Source/WebCore/css/CSSProperties.json', 'Source/WebCore/page/Settings.yaml') }}

      - name: Cache generated JSC files
        id: cache-jsc-generated
        uses: actions/cache@v5.0.4
        with:
          path: .generated-jsc-cache
          key: generated-jsc-headers-${{ hashFiles('Source/JavaScriptCore/bytecode/BytecodeList.rb', 'Source/JavaScriptCore/wasm/wasm.json', 'Source/JavaScriptCore/generator/main.rb') }}

      - name: Generate HTTPHeaderNames
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          cd $GITHUB_WORKSPACE/.generated-cache
          python3 $GITHUB_WORKSPACE/Source/WebCore/platform/network/create-http-header-name-table \
            $GITHUB_WORKSPACE/Source/WebCore/platform/network/HTTPHeaderNames.in \
            gperf

      - name: Generate CSSValueKeywords
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          cd $GITHUB_WORKSPACE/.generated-cache
          cat $GITHUB_WORKSPACE/Source/WebCore/css/CSSValueKeywords.in \
              $GITHUB_WORKSPACE/Source/WebCore/css/SVGCSSValueKeywords.in > CSSValueKeywords.in
          python3 $GITHUB_WORKSPACE/Source/WebCore/css/scripts/process-css-values.py \
            --gperf-executable gperf

      - name: Generate FrameTreeSyncData
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          python3 $GITHUB_WORKSPACE/Source/WebCore/Scripts/generate-process-sync-data.py \
            "FrameTree" \
            $GITHUB_WORKSPACE/Source/WebCore/page/FrameTreeSyncData.in \
            $GITHUB_WORKSPACE/.generated-cache

      - name: Generate HTML Names
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          perl $GITHUB_WORKSPACE/Source/WebCore/dom/make_names.pl \
            --outputDir $GITHUB_WORKSPACE/.generated-cache \
            --attrs $GITHUB_WORKSPACE/Source/WebCore/html/HTMLAttributeNames.in \
            --elements $GITHUB_WORKSPACE/Source/WebCore/html/HTMLTagNames.in \
            --factory --wrapperFactory

      - name: Generate SVG Names
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          perl $GITHUB_WORKSPACE/Source/WebCore/dom/make_names.pl \
            --outputDir $GITHUB_WORKSPACE/.generated-cache \
            --attrs $GITHUB_WORKSPACE/Source/WebCore/svg/svgattrs.in \
            --elements $GITHUB_WORKSPACE/Source/WebCore/svg/svgtags.in \
            --factory --wrapperFactory

      - name: Generate MathML Names
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          perl $GITHUB_WORKSPACE/Source/WebCore/dom/make_names.pl \
            --outputDir $GITHUB_WORKSPACE/.generated-cache \
            --attrs $GITHUB_WORKSPACE/Source/WebCore/mathml/mathattrs.in \
            --elements $GITHUB_WORKSPACE/Source/WebCore/mathml/mathtags.in \
            --factory --wrapperFactory

      - name: Generate Font Family Names
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          perl $GITHUB_WORKSPACE/Source/WebCore/dom/make_names.pl \
            --outputDir $GITHUB_WORKSPACE/.generated-cache \
            --fonts $GITHUB_WORKSPACE/Source/WebCore/css/WebKitFontFamilyNames.in

      - name: Generate CSS Properties
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          cd $GITHUB_WORKSPACE/.generated-cache
          perl -ne "print" $GITHUB_WORKSPACE/Source/WebCore/css/CSSProperties.json > CSSProperties.json
          python3 $GITHUB_WORKSPACE/Source/WebCore/css/scripts/process-css-properties.py \
            --defines "" \
            --gperf-executable gperf

      - name: Generate Settings
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-cache
          ruby $GITHUB_WORKSPACE/Source/WebCore/Scripts/GenerateSettings.rb \
            --outputDir $GITHUB_WORKSPACE/.generated-cache \
            --template $GITHUB_WORKSPACE/Source/WebCore/Scripts/SettingsTemplates/Settings.h.erb \
            --template $GITHUB_WORKSPACE/Source/WebCore/Scripts/SettingsTemplates/Settings.cpp.erb \
            $GITHUB_WORKSPACE/Source/WTF/Scripts/Preferences/UnifiedWebPreferences.yaml \
            $GITHUB_WORKSPACE/Source/WebCore/page/Settings.yaml

      - name: Generate JSC Bytecodes
        if: steps.cache-jsc-generated.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-jsc-cache
          ruby $GITHUB_WORKSPACE/Source/JavaScriptCore/generator/main.rb \
            --bytecodes_h $GITHUB_WORKSPACE/.generated-jsc-cache/Bytecodes.h \
            --init_bytecodes_asm $GITHUB_WORKSPACE/.generated-jsc-cache/InitBytecodes.asm \
            --bytecode_structs_h $GITHUB_WORKSPACE/.generated-jsc-cache/BytecodeStructs.h \
            --bytecode_indices_h $GITHUB_WORKSPACE/.generated-jsc-cache/BytecodeIndices.h \
            $GITHUB_WORKSPACE/Source/JavaScriptCore/bytecode/BytecodeList.rb \
            --wasm_json $GITHUB_WORKSPACE/Source/JavaScriptCore/wasm/wasm.json \
            --bytecode_dumper $GITHUB_WORKSPACE/.generated-jsc-cache/BytecodeDumperGenerated.cpp

      - name: Generate JSC Builtins
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-jsc-cache
          mkdir -p $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore
          JSC_FILES=$(grep -o 'builtins/[A-Za-z0-9._-]*\.js' \
            $GITHUB_WORKSPACE/Source/JavaScriptCore/CMakeLists.txt \
            | sort | uniq \
            | sed "s|builtins/|$GITHUB_WORKSPACE/Source/JavaScriptCore/builtins/|" \
            | tr '\n' ' ')
          python3 $GITHUB_WORKSPACE/Source/JavaScriptCore/Scripts/generate-js-builtins.py \
            --framework JavaScriptCore \
            --output-directory $GITHUB_WORKSPACE/.generated-jsc-cache \
            $JSC_FILES

      - name: Create JSCBuiltins.h combined header
        run: |
          mkdir -p $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore
          CACHE=$GITHUB_WORKSPACE/.generated-jsc-cache
          OUT=$CACHE/JSCBuiltins.h
          # Write header includes
          echo "#pragma once" > $OUT
          echo "" >> $OUT
          for h in $CACHE/*Builtins.h; do
            echo "#include \"$(basename $h)\"" >> $OUT
          done
          echo "" >> $OUT
          # Generate combined JSC_FOREACH_BUILTIN_LINK_TIME_CONSTANT using python
          python3 << PYEOF
          import os, re
          cache = "$CACHE"
          lines = []
          seen = set()
          for fname in sorted(os.listdir(cache)):
              if not fname.endswith("Builtins.h"):
                  continue
              text = open(os.path.join(cache, fname)).read()
              # Find JSC_FOREACH_*_BUILTIN_CODE_NAME macros which list the link time constants
              for m in re.finditer(r'JSC_FOREACH_\w+_BUILTIN_CODE_NAME\(macro\)\s*\\(.*?)(?=\n\n|\Z)', text, re.DOTALL):
                  for name_m in re.finditer(r'macro\((\w+)\)', m.group(0)):
                      name = name_m.group(1)
                      if name not in seen:
                          seen.add(name)
                          lines.append(f"    macro({name}, nullptr) \\")
          with open(os.path.join(cache, "JSCBuiltins.h"), "a") as f:
              f.write("#define JSC_FOREACH_BUILTIN_LINK_TIME_CONSTANT(macro) \\\n")
              if lines:
                  f.write("\n".join(lines) + "\n")
              else:
                  f.write("    /* no builtin link time constants */\n")
          PYEOF
          cp $OUT $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/JSCBuiltins.h
          echo "=== JSCBuiltins.h first 40 lines ==="
          head -40 $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/JSCBuiltins.h

      - name: Generate WebCore Builtins
        run: |
          mkdir -p $GITHUB_WORKSPACE/.generated-jsc-cache
          WC_FILES=$(find $GITHUB_WORKSPACE/Source/WebCore/Modules -name "*.js" 2>/dev/null \
            | xargs grep -l "Copyright" 2>/dev/null | sort | tr '\n' ' ')
          if [ -n "$WC_FILES" ]; then
            python3 $GITHUB_WORKSPACE/Source/JavaScriptCore/Scripts/generate-js-builtins.py \
              --framework WebCore \
              --output-directory $GITHUB_WORKSPACE/.generated-jsc-cache \
              $WC_FILES || true
          fi

      - name: Create WebCore forwarding headers
        run: |
          mkdir -p $GITHUB_WORKSPACE/Source/WebCore/WebCore
          find $GITHUB_WORKSPACE/Source/WebCore -name "*.h" \
            -not -path "*/WebCore/WebCore/*" \
            -not -path "*/network/soup/*" \
            -not -path "*/platform/soup/*" \
            -not -path "*/soup/*" \
            -not -name "PlatformPattern.h" \
            -not -name "PlatformImage.h" \
            -not -name "PlatformPath.h" \
            -not -name "FontCustomPlatformData.h" \
            -exec bash -c 'ln -sf "$1" "$GITHUB_WORKSPACE/Source/WebCore/WebCore/$(basename $1)"' _ {} \;

      - name: Create JavaScriptCore forwarding headers
        run: |
          mkdir -p $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore
          find $GITHUB_WORKSPACE/Source/JavaScriptCore -name "*.h" -not -path "*/JavaScriptCore/JavaScriptCore/*" \
            -exec bash -c 'ln -sf "$1" "$GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/$(basename $1)"' _ {} \;

      - name: Copy generated files into build tree
        run: |
          cp $GITHUB_WORKSPACE/.generated-cache/*.h $GITHUB_WORKSPACE/Source/WebCore/WebCore/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/.generated-cache/*.cpp $GITHUB_WORKSPACE/Source/WebCore/WebCore/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/.generated-jsc-cache/Bytecodes.h $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/.generated-jsc-cache/BytecodeStructs.h $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/.generated-jsc-cache/BytecodeIndices.h $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/ 2>/dev/null || true
          find $GITHUB_WORKSPACE/.generated-jsc-cache -name "*.h" \
            -exec cp {} $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/ \; 2>/dev/null || true
          find $GITHUB_WORKSPACE/.generated-jsc-cache -name "*.cpp" \
            -exec cp {} $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/ \; 2>/dev/null || true

      - name: Cache CMake build
        uses: actions/cache@v5.0.4
        with:
          path: build
          key: cmake-build-${{ hashFiles('Source/WebKit/WKC/**', 'Source/WebCore/platform/WKC/**', 'Source/WTF/wtf/WKC/**') }}
          restore-keys: |
            cmake-build-

      - name: Add devkitPPC to PATH
        run: |
          echo "/opt/devkitpro/devkitPPC/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin"      >> $GITHUB_PATH

      - name: Configure (CMake)
        run: |
          cmake -S $GITHUB_WORKSPACE/Source/WebKit/WKC -B build \
            --fresh \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/Source/WebKit/WKC/cmake/WiiUToolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build WKC library
        run: cmake --build build --parallel $(nproc)

      - name: Collect output
        run: |
          mkdir -p dist/lib dist/include
          cp build/libWebKitWKC.a dist/lib/
          cp -r Source/WebKit/WKC/include/wkc dist/include/

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: webkit-wiiu-lib
          path: dist/
          retention-days: 30
