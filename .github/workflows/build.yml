name: Build WebKit WiiU (WKC)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT:  /opt/devkitpro/wut

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          sparse-checkout: |
            Source/JavaScriptCore
            Source/WebCore
            Source/WebKit/WKC
            Source/WTF
            Source/bmalloc

      - name: Create WebCore forwarding headers
        run: |
          mkdir -p $GITHUB_WORKSPACE/Source/WebCore/WebCore
          find $GITHUB_WORKSPACE/Source/WebCore -name "*.h" -not -path "*/WebCore/WebCore/*" \
            -exec bash -c 'ln -sf "$1" "$GITHUB_WORKSPACE/Source/WebCore/WebCore/$(basename $1)"' _ {} \;

      - name: Create JavaScriptCore forwarding headers
        run: |
          mkdir -p $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore
          find $GITHUB_WORKSPACE/Source/JavaScriptCore -name "*.h" -not -path "*/JavaScriptCore/JavaScriptCore/*" \
            -exec bash -c 'ln -sf "$1" "$GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/$(basename $1)"' _ {} \;

      - name: Install CMake + build tools
        run: |
          apt-get update -q
          apt-get install -y cmake ninja-build python3 libicu-dev gperf ruby

      - name: Install ICU headers
        run: |
          mkdir -p /tmp/icu-headers
          cp -r /usr/include/unicode /tmp/icu-headers/

      - name: Generate HTTPHeaderNames
        run: |
          cd $GITHUB_WORKSPACE/Source/WebCore/WebCore
          python3 $GITHUB_WORKSPACE/Source/WebCore/platform/network/create-http-header-name-table \
            $GITHUB_WORKSPACE/Source/WebCore/platform/network/HTTPHeaderNames.in \
            gperf

      - name: Generate CSSValueKeywords
        run: |
          mkdir -p /tmp/css-generated
          cd /tmp/css-generated
          cat $GITHUB_WORKSPACE/Source/WebCore/css/CSSValueKeywords.in \
              $GITHUB_WORKSPACE/Source/WebCore/css/SVGCSSValueKeywords.in > CSSValueKeywords.in
          python3 $GITHUB_WORKSPACE/Source/WebCore/css/scripts/process-css-values.py \
            --gperf-executable gperf
          cp CSSValueKeywords.h $GITHUB_WORKSPACE/Source/WebCore/WebCore/

      - name: Find CSS property source file
        run: |
          find $GITHUB_WORKSPACE/Source/WebCore/css -name "CSSPropert*" | head -20

      - name: Generate CSSPropertyNames
        run: |
          CSS_IN=$(find $GITHUB_WORKSPACE/Source/WebCore/css -name "CSSProperties*.in" -o -name "CSSPropertyNames.in" 2>/dev/null | head -1)
          CSS_JSON=$(find $GITHUB_WORKSPACE/Source/WebCore/css -name "CSSProperties*.json" 2>/dev/null | head -1)
          CSS_FILE="${CSS_IN:-$CSS_JSON}"
          echo "Using CSS properties file: $CSS_FILE"
          python3 $GITHUB_WORKSPACE/Source/WebKit/WKC/scripts/generate-css-property-names.py \
            "$CSS_FILE" \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore/CSSPropertyNames.h

      - name: Generate WebKitFontFamilyNames
        run: |
          python3 $GITHUB_WORKSPACE/Source/WebKit/WKC/scripts/generate-font-family-names.py \
            $GITHUB_WORKSPACE/Source/WebCore/css/WebKitFontFamilyNames.in \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore/WebKitFontFamilyNames.h

      - name: Generate HTMLNames
        run: |
          python3 $GITHUB_WORKSPACE/Source/WebKit/WKC/scripts/generate-html-names.py \
            $GITHUB_WORKSPACE/Source/WebCore/html/HTMLTagNames.in \
            $GITHUB_WORKSPACE/Source/WebCore/html/HTMLAttributeNames.in \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore/HTMLNames.h

      - name: Generate HTMLElementTypeHelpers
        run: |
          python3 $GITHUB_WORKSPACE/Source/WebKit/WKC/scripts/generate-html-element-type-helpers.py \
            $GITHUB_WORKSPACE/Source/WebCore/html/HTMLTagNames.in \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore/HTMLElementTypeHelpers.h

      - name: Generate Settings stub
        run: |
          python3 $GITHUB_WORKSPACE/Source/WebKit/WKC/scripts/generate-settings.py \
            $GITHUB_WORKSPACE/Source/WebCore/page/Settings.yaml \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore/Settings.h

      - name: Patch generated RenderStyle headers to remove test-only types
        run: |
          sed -i '/TestEnumeration\|TestRaw\|TestRenderStyle/d' \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore/RenderStyleProperties.h || true
          sed -i '/TestEnumeration\|TestRaw\|TestRenderStyle/d' \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore/StyleComputedStyleProperties.h || true

      - name: Copy FontPlatformSerializedData stub to WebCore forwarding dir
        run: |
          cp $GITHUB_WORKSPACE/Source/WebKit/WKC/stubs/WebCore/FontPlatformSerializedData.h \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore/FontPlatformSerializedData.h

      - name: Generate FrameTreeSyncData
        run: |
          python3 $GITHUB_WORKSPACE/Source/WebCore/Scripts/generate-process-sync-data.py \
            "FrameTree" \
            $GITHUB_WORKSPACE/Source/WebCore/page/FrameTreeSyncData.in \
            $GITHUB_WORKSPACE/Source/WebCore/WebCore

      - name: Generate JSC Bytecodes
        run: |
          ruby $GITHUB_WORKSPACE/Source/JavaScriptCore/generator/main.rb \
            --bytecodes_h $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/Bytecodes.h \
            --init_bytecodes_asm /tmp/InitBytecodes.asm \
            --bytecode_structs_h $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/BytecodeStructs.h \
            --bytecode_indices_h $GITHUB_WORKSPACE/Source/JavaScriptCore/JavaScriptCore/BytecodeIndices.h \
            $GITHUB_WORKSPACE/Source/JavaScriptCore/bytecode/BytecodeList.rb \
            --wasm_json $GITHUB_WORKSPACE/Source/JavaScriptCore/wasm/wasm.json \
            --bytecode_dumper /tmp/BytecodeDumperGenerated.cpp

      - name: Add devkitPPC to PATH
        run: |
          echo "/opt/devkitpro/devkitPPC/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin"      >> $GITHUB_PATH

      - name: Configure (CMake)
        run: |
          cmake -S $GITHUB_WORKSPACE/Source/WebKit/WKC -B build \
            --fresh \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/Source/WebKit/WKC/cmake/WiiUToolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build WKC library
        run: cmake --build build --parallel $(nproc)

      - name: Collect output
        run: |
          mkdir -p dist/lib dist/include
          cp build/libWebKitWKC.a dist/lib/
          cp -r Source/WebKit/WKC/include/wkc dist/include/

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: webkit-wiiu-lib
          path: dist/
          retention-days: 30
